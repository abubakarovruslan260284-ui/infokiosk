name: Build Windows kiosk (Tauri)

# Тот же принцип, что уже используется для Irskom Audio Manager:
# сборка идёт не локально, а в GitHub Actions на чистой машине с
# актуальным Rust/Node — поэтому никаких проблем с версиями
# инструментов, как в песочнице, где собирался этот прототип, здесь
# не будет: раннер сам ставит свежий toolchain.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Установить Rust
        # Точная версия компилятора берётся из файла rust-toolchain.toml
        # в корне проекта (закреплена там на 1.77.2 ради Windows 7/8/8.1
        # на ваших киосках) — этот шаг просто ставит инструмент, а какую
        # именно версию использовать, rustup решает по тому файлу сам.
        uses: dtolnay/rust-toolchain@stable

      - name: Кэш Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Установить Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Прогнать тесты движка синхронизации (kiosk_sync)
        run: cargo test --manifest-path src-tauri/kiosk_sync/Cargo.toml

      - name: Скачать WebView2 для старых Windows (7/8/8.1)
        # Часть Windows, которая рисует интерфейс программы (WebView2),
        # Microsoft перестала обновлять для Windows 7/8/8.1 в январе
        # 2023-го. Последняя версия, которая там ещё работает, — 109.
        # Вшиваем её прямо в установщик, чтобы всё работало даже без
        # интернета на самом киоске и независимо от того, что уже
        # стоит на компьютере. (Архив последней рабочей версии — не от
        # Microsoft напрямую, а из проверенного открытого архива,
        # т.к. у самой Microsoft старые версии для скачивания уже
        # убраны со страницы.)
        shell: pwsh
        run: |
          $cabUrl = "https://github.com/westinyang/WebView2RuntimeArchive/releases/download/109.0.1518.78/Microsoft.WebView2.FixedVersionRuntime.109.0.1518.78.x64.cab"
          Invoke-WebRequest -Uri $cabUrl -OutFile "webview2-fixed.cab"
          $dest = "src-tauri/Microsoft.WebView2.FixedVersionRuntime.109.0.1518.78.x64"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          expand webview2-fixed.cab -F:* $dest

      - name: ДИАГНОСТИКА — кто просит toml_datetime новой версии
        # Временный шаг для расследования. Старый cargo (1.77.2) не
        # может даже посмотреть на пакет с edition2024 — падает точно
        # так же, как и сама сборка, поэтому ставим рядом ВРЕМЕННО
        # современный cargo (не трогая основной, закреплённый 1.77.2 —
        # он не участвует в реальной сборке) и смотрим им, кто именно
        # просит новую версию. Ничего не ломает и не мешает следующему
        # шагу. Можно будет убрать, когда найдём и почини́м причину.
        shell: pwsh
        continue-on-error: true
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          cd src-tauri
          cargo +stable tree -i toml_datetime -e normal,build,dev
          Write-Host "---"
          cargo +stable tree -i toml_edit -e normal,build,dev

      - name: Собрать инфокиоск (.exe/.msi/.nsis)
        run: tauri build
        working-directory: .

      - name: Переименовать установщик в безопасное имя
        # Имя программы содержит кириллицу ("Инфокиоск"), и NSIS
        # собирает файл вида "Инфокиоск_1.0.3_x64-setup.exe". При
        # публикации на GitHub такое имя иногда ломает прямую ссылку
        # на скачивание (кириллица в URL). Переименовываем в
        # предсказуемое имя из латиницы — ссылка на установщик всегда
        # будет одна и та же и всегда будет рабочей.
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          Rename-Item -Path $installer.FullName -NewName "Infokiosk-Setup-x64.exe"

      - name: Собрать «Издателя» (kiosk_publish CLI)
        run: cargo build --release --manifest-path tools/kiosk-publisher-cli/Cargo.toml

      - name: Опубликовать артефакты сборки
        uses: actions/upload-artifact@v4
        with:
          name: infokiosk-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/infokiosk.exe
            tools/kiosk-publisher-cli/target/release/kiosk_publish.exe
          if-no-files-found: error

      - name: Опубликовать релиз со стабильной ссылкой на скачивание
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Инфокиоск — сборка №${{ github.run_number }}"
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            tools/kiosk-publisher-cli/target/release/kiosk_publish.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
